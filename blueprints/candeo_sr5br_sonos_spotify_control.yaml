blueprint:
  name: Candeo SR5BR - Sonos Spotify Control (Enhanced) v6
  description: |
    Control Spotify playback on Sonos using the Candeo C-ZB-SR5BR scene remote.
    - Buttons 1-4: Play specific Spotify playlists (with shuffle enabled)
    - Centre button (single): Play/Pause
    - Centre button (double): Skip to next track
    - Rotary dial: Volume up/down
  domain: automation
  input:
    remote:
      name: Candeo SR5BR Remote
      description: Select your Candeo C-ZB-SR5BR device
      selector:
        device:
          integration: zha
          manufacturer: Candeo
          model: C-ZB-SR5BR

    sonos_device:
      name: Sonos Device
      description: Select your Sonos speaker
      selector:
        entity:
          domain: media_player

    playlist_1:
      name: Button 1 - Spotify Playlist URI
      description: |
        Spotify URI for playlist 1 (e.g., spotify:playlist:37i9dQZF1DXcBWIGoYBM5M)
      default: ""
      selector:
        text:

    playlist_2:
      name: Button 2 - Spotify Playlist URI
      default: ""
      selector:
        text:

    playlist_3:
      name: Button 3 - Spotify Playlist URI
      default: ""
      selector:
        text:

    playlist_4:
      name: Button 4 - Spotify Playlist URI
      default: ""
      selector:
        text:

    volume_step:
      name: Volume Step Size
      description: How much to change volume with each dial rotation (%)
      default: 5
      selector:
        number:
          min: 1
          max: 20
          step: 1
          unit_of_measurement: "%"

mode: queued
max: 10
max_exceeded: silent

trigger:
  - platform: event
    event_type: zha_event
    event_data:
      device_id: !input remote

action:
  - variables:
      sonos: !input sonos_device
      vol_step: !input volume_step
      pl1: !input playlist_1
      pl2: !input playlist_2
      pl3: !input playlist_3
      pl4: !input playlist_4
      command: "{{ trigger.event.data.command | default('') }}"
      button: "{{ trigger.event.data.args.button | default('') if trigger.event.data.args is defined else '' }}"
      direction: "{{ trigger.event.data.args.device_rotated | default('') if trigger.event.data.args is defined else '' }}"

  - choose:
      # Button 1
      - conditions:
          - "{{ command == 'press' and button == 'button_1' and pl1 != '' }}"
        sequence:
          - action: media_player.shuffle_set
            target:
              entity_id: "{{ sonos }}"
            data:
              shuffle: true
          - action: media_player.play_media
            target:
              entity_id: "{{ sonos }}"
            data:
              media_content_type: playlist
              media_content_id: "{{ pl1 }}"

      # Button 2
      - conditions:
          - "{{ command == 'press' and button == 'button_2' and pl2 != '' }}"
        sequence:
          - action: media_player.shuffle_set
            target:
              entity_id: "{{ sonos }}"
            data:
              shuffle: true
          - action: media_player.play_media
            target:
              entity_id: "{{ sonos }}"
            data:
              media_content_type: playlist
              media_content_id: "{{ pl2 }}"

      # Button 3
      - conditions:
          - "{{ command == 'press' and button == 'button_3' and pl3 != '' }}"
        sequence:
          - action: media_player.shuffle_set
            target:
              entity_id: "{{ sonos }}"
            data:
              shuffle: true
          - action: media_player.play_media
            target:
              entity_id: "{{ sonos }}"
            data:
              media_content_type: playlist
              media_content_id: "{{ pl3 }}"

      # Button 4
      - conditions:
          - "{{ command == 'press' and button == 'button_4' and pl4 != '' }}"
        sequence:
          - action: media_player.shuffle_set
            target:
              entity_id: "{{ sonos }}"
            data:
              shuffle: true
          - action: media_player.play_media
            target:
              entity_id: "{{ sonos }}"
            data:
              media_content_type: playlist
              media_content_id: "{{ pl4 }}"

      # Centre button single press - Play/Pause
      - conditions:
          - "{{ command == 'press' and button == 'button_centre' }}"
        sequence:
          - action: media_player.media_play_pause
            target:
              entity_id: "{{ sonos }}"

      # Centre button double press - Skip to next track
      - conditions:
          - "{{ command == 'double' and button == 'button_centre' }}"
        sequence:
          - action: media_player.media_next_track
            target:
              entity_id: "{{ sonos }}"

      # Dial right - Volume Up
      - conditions:
          - "{{ command in ['started_rotating', 'continued_rotating'] and direction == 'right' }}"
        sequence:
          - action: media_player.volume_set
            target:
              entity_id: "{{ sonos }}"
            data:
              volume_level: >
                {% set current = state_attr(sonos, 'volume_level') | float(0) %}
                {% set new_vol = current + (vol_step / 100) %}
                {{ [new_vol, 1.0] | min }}

      # Dial left - Volume Down
      - conditions:
          - "{{ command in ['started_rotating', 'continued_rotating'] and direction == 'left' }}"
        sequence:
          - action: media_player.volume_set
            target:
              entity_id: "{{ sonos }}"
            data:
              volume_level: >
                {% set current = state_attr(sonos, 'volume_level') | float(0) %}
                {% set new_vol = current - (vol_step / 100) %}
                {{ [new_vol, 0.0] | max }}
