blueprint:
  name: Candeo SR5BR - Sonos Spotify Control
  description: |
    Control Spotify playback on Sonos using the Candeo C-ZB-SR5BR scene remote.
    - Button 1-4: Play specific Spotify playlists
    - Centre button: Play/Pause music
    - Rotary dial: Volume up/down
  domain: automation
  input:
    remote:
      name: Candeo SR5BR Remote
      description: Select your Candeo C-ZB-SR5BR device
      selector:
        device:
          integration: zha
          manufacturer: Candeo
          model: C-ZB-SR5BR
    
    sonos_device:
      name: Sonos Device
      description: Select your Sonos speaker
      selector:
        entity:
          domain: media_player
    
    playlist_1:
      name: Button 1 - Spotify Playlist URI
      description: |
        Spotify URI for playlist 1 (e.g., spotify:playlist:37i9dQZF1DXcBWIGoYBM5M)
        Find URI: Open Spotify > Right-click playlist > Share > Copy Spotify URI
      default: ""
      selector:
        text:
    
    playlist_2:
      name: Button 2 - Spotify Playlist URI
      description: Spotify URI for playlist 2
      default: ""
      selector:
        text:
    
    playlist_3:
      name: Button 3 - Spotify Playlist URI
      description: Spotify URI for playlist 3
      default: ""
      selector:
        text:
    
    playlist_4:
      name: Button 4 - Spotify Playlist URI
      description: Spotify URI for playlist 4
      default: ""
      selector:
        text:
    
    volume_step:
      name: Volume Step Size
      description: How much to change volume with each dial rotation (%)
      default: 5
      selector:
        number:
          min: 1
          max: 20
          step: 1
          unit_of_measurement: "%"

mode: restart
max_exceeded: silent

trigger:
  - platform: event
    event_type: zha_event
    event_data:
      device_id: !input remote

action:
  - variables:
      command: "{{ trigger.event.data.command }}"
      sonos: !input sonos_device
      vol_step: !input volume_step
      pl1: !input playlist_1
      pl2: !input playlist_2
      pl3: !input playlist_3
      pl4: !input playlist_4
  
  - choose:
      # Button 1 - Play Playlist 1
      - conditions:
          - condition: template
            value_template: "{{ command == 'button_1_click' }}"
          - condition: template
            value_template: "{{ pl1 != '' }}"
        sequence:
          - service: media_player.play_media
            target:
              entity_id: "{{ sonos }}"
            data:
              media_content_type: playlist
              media_content_id: "{{ pl1 }}"
      
      # Button 2 - Play Playlist 2
      - conditions:
          - condition: template
            value_template: "{{ command == 'button_2_click' }}"
          - condition: template
            value_template: "{{ pl2 != '' }}"
        sequence:
          - service: media_player.play_media
            target:
              entity_id: "{{ sonos }}"
            data:
              media_content_type: playlist
              media_content_id: "{{ pl2 }}"
      
      # Button 3 - Play Playlist 3
      - conditions:
          - condition: template
            value_template: "{{ command == 'button_3_click' }}"
          - condition: template
            value_template: "{{ pl3 != '' }}"
        sequence:
          - service: media_player.play_media
            target:
              entity_id: "{{ sonos }}"
            data:
              media_content_type: playlist
              media_content_id: "{{ pl3 }}"
      
      # Button 4 - Play Playlist 4
      - conditions:
          - condition: template
            value_template: "{{ command == 'button_4_click' }}"
          - condition: template
            value_template: "{{ pl4 != '' }}"
        sequence:
          - service: media_player.play_media
            target:
              entity_id: "{{ sonos }}"
            data:
              media_content_type: playlist
              media_content_id: "{{ pl4 }}"
      
      # Centre Button - Play/Pause Toggle
      - conditions:
          - condition: template
            value_template: "{{ command == 'centre_button_click' }}"
        sequence:
          - service: media_player.media_play_pause
            target:
              entity_id: "{{ sonos }}"
      
      # Dial Rotation Right - Volume Up
      - conditions:
          - condition: template
            value_template: "{{ command in ['started_rotating_right', 'continued_rotating_right'] }}"
        sequence:
          - service: media_player.volume_set
            target:
              entity_id: "{{ sonos }}"
            data:
              volume_level: >
                {% set current = state_attr(sonos, 'volume_level') | float(0) %}
                {% set new_vol = current + (vol_step / 100) %}
                {{ [new_vol, 1.0] | min }}
      
      # Dial Rotation Left - Volume Down
      - conditions:
          - condition: template
            value_template: "{{ command in ['started_rotating_left', 'continued_rotating_left'] }}"
        sequence:
          - service: media_player.volume_set
            target:
              entity_id: "{{ sonos }}"
            data:
              volume_level: >
                {% set current = state_attr(sonos, 'volume_level') | float(0) %}
                {% set new_vol = current - (vol_step / 100) %}
                {{ [new_vol, 0.0] | max }}
